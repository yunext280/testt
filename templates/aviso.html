<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>EInkBot - Aviso</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="page-content">
        <div class="cards-container">
            <a href="https://aviso.bz/login" class="card">aviso.bz {% if aviso_done %}✔{% endif %}</a>
            <a href="https://m.youtube.com/feed/library?hl=en" class="card">YouTube {% if yt_done %}✔{% endif %}</a>
        </div>
        <div id="authMessage" class="auth-message" style="display:none">⚠️ Please log in to aviso.bz</div>
        <div id="ytAuthMessage" class="auth-message" style="display:none">⚠️ Stop the bot, please log in to YouTube to complete YouTube tasks if you want. Then start the bot.</div>
        {% if aviso_done %}
        <div class="stream-status">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Offline</span>
        </div>
        <div class="stream-url" id="streamUrl" style="display:none;">
            <a href="/video_feed?token={{ token }}" target="_blank">Stream URL</a>
        </div>
        <div class="bot-controls">
            <button id="btnStart" class="bot-btn" onclick="botStart()" {% if bot_started %}disabled{% endif %}>Start</button>
            <button id="btnStop" class="bot-btn" onclick="botStop()" {% if not bot_started %}disabled{% endif %}>Stop</button>
        </div>
        <div class="screenshot-container">
            <img id="streamView" class="stream-view" style="display:none" alt="البث الحي للمتصفح">
        </div>
        <script>
        (function(){
            var statusDot = document.getElementById('statusDot');
            var statusText = document.getElementById('statusText');
            var streamUrl = document.getElementById('streamUrl');
            var authMsg = document.getElementById('authMessage');
            var ytAuthMsg = document.getElementById('ytAuthMessage');
            setInterval(function(){
                fetch("/stream_status?token={{ token }}").then(function(r){return r.json()}).then(function(d){
                    if(!d.aviso_valid){
                        authMsg.style.display = 'block';
                        ytAuthMsg.style.display = 'none';
                        statusDot.className = 'status-dot offline';
                        statusText.textContent = 'Offline';
                        return;
                    }
                    authMsg.style.display = 'none';
                    ytAuthMsg.style.display = d.yt_valid ? 'none' : 'block';
                    if(d.active){
                        statusDot.className = 'status-dot live';
                        statusText.textContent = 'Live';
                        document.getElementById('streamView').src='/video_feed?token={{ token }}';
                        document.getElementById('streamView').style.display='block';
                        if(streamUrl) streamUrl.style.display='block';
                    } else if(d.bot_running){
                        statusDot.className = 'status-dot connecting';
                        statusText.textContent = 'Connecting...';
                    } else {
                        statusDot.className = 'status-dot offline';
                        statusText.textContent = 'Offline';
                    }
                }).catch(function(){});
            }, 2000);
        })();
        </script>
        {% endif %}
    </div>
    <div class="version">v{{ version }}</div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
    function botStart() {
        fetch("/bot/start?token={{ token }}", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({user_agent: navigator.userAgent})})
        .then(r=>r.json()).then(()=>location.reload());
    }
    function botStop() {
        fetch("/bot/stop?token={{ token }}", {method:"POST"})
        .then(r=>r.json()).then(()=>location.reload());
    }
    </script>
</body>
</html>
