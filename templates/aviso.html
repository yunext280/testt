<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>EInkBot - Aviso</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="header-container">
        <h1 class="brand-name">EinkBot</h1>
    </div>
    <div class="page-content">
        <div class="cards-container">
            <a href="https://aviso.bz/login" class="card">aviso.bz {% if aviso_done %}✔{% endif %}</a>
            <a href="https://m.youtube.com/feed/library?hl=en" class="card">YouTube {% if yt_done %}✔{% endif %}</a>
        </div>
        {% if aviso_done %}
        <div class="stream-status">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Offline</span>
        </div>
        <div class="stream-url" id="streamUrl" style="display:none;">
            <a href="/video_feed?token={{ token }}" target="_blank">Stream URL</a>
        </div>
        <div class="bot-controls">
            <button id="btnStart" class="bot-btn" onclick="botStart()" {% if bot_started %}disabled{% endif %}>Start</button>
            <button id="btnStop" class="bot-btn" onclick="botStop()" {% if not bot_started %}disabled{% endif %}>Stop</button>
        </div>
        {% endif %}
        {% if screenshot_exists %}
        <div class="screenshot-container">
            <h3 id="loadingText" style="color: #fff; position: absolute; top: 45%;">جاري تشغيل البث...</h3>
            <img id="streamView" class="stream-view" style="display:none" alt="البث الحي للمتصفح">
        </div>
        <script>
        (function(){
            var statusDot = document.getElementById('statusDot');
            var statusText = document.getElementById('statusText');
            var streamUrl = document.getElementById('streamUrl');
            var check = function(){
                fetch("/stream_status?token={{ token }}").then(function(r){return r.json()}).then(function(d){
                    if(d.active){
                        statusDot.className = 'status-dot live';
                        statusText.textContent = 'Live';
                        document.getElementById('streamView').src='/video_feed?token={{ token }}';
                        document.getElementById('streamView').style.display='block';
                        document.getElementById('loadingText').style.display='none';
                        if(streamUrl) streamUrl.style.display='block';
                    }else{
                        statusDot.className = 'status-dot connecting';
                        statusText.textContent = 'Connecting...';
                        setTimeout(check, 1000);
                    }
                });
            };
            setTimeout(check, 3000);
        })();
        </script>
        {% endif %}
        <pre id="debugBox" style="color:#0ff;font-size:10px;text-align:left;max-height:150px;overflow-y:auto;z-index:2;position:relative;margin:20px auto;width:90%;background:rgba(0,0,0,0.5);padding:8px;border-radius:4px;"></pre>
        <div style="z-index:2;position:relative;margin:8px auto;text-align:center;">
            <a href="/debug?token={{ token }}" style="color:#0ff;font-size:12px;border:1px solid #0ff;padding:3px 10px;border-radius:4px;text-decoration:none;">Full Debug Page →</a>
        </div>
    </div>
    <div class="version">v{{ version }}</div>
    <div id="particles-js"></div>
    <script src="{{ url_for('static', filename='particles.min.js') }}"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
    function botStart() {
        fetch("/bot/start?token={{ token }}", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({user_agent: navigator.userAgent})})
        .then(r=>r.json()).then(()=>location.reload());
    }
    function botStop() {
        fetch("/bot/stop?token={{ token }}", {method:"POST"})
        .then(r=>r.json()).then(()=>location.reload());
    }
    function updateDebug(){
        fetch("/flask_debug?token={{ token }}").then(r=>r.json()).then(d=>{
            var box=document.getElementById('debugBox');
            if(box){
                var active=d.active?"Live":"Offline";
                var bot=d.bot_running?"Running":"Stopped";
                box.textContent="Status: "+active+" | Bot: "+bot+" | Frames: "+d.frame_count+"\nStream: "+d.stream_url+"\n"+d.log.join("\n");
                box.scrollTop=box.scrollHeight;
            }
            if(!d.active&&d.bot_running){
                var dot=document.getElementById('statusDot');
                var txt=document.getElementById('statusText');
                if(dot){dot.className='status-dot connecting';}
                if(txt){txt.textContent='Connecting...';}
            }
            if(!d.bot_running){
                var dot=document.getElementById('statusDot');
                var txt=document.getElementById('statusText');
                if(dot){dot.className='status-dot offline';}
                if(txt){txt.textContent='Offline';}
            }
        }).catch(function(){});
    }
    setInterval(updateDebug, 2000);
    updateDebug();
    </script>
</body>
</html>
